name: Pipeline de Despesas Diária

on:
  # Agendamento: Roda todos os dias às 08:00 (UTC)
  schedule:
    - cron: '0 8 * * *'
  
  # Permite que você clique num botão para rodar manualmente a qualquer momento
  workflow_dispatch: 

jobs:
  run-etl:
    runs-on: ubuntu-latest # O GitHub liga um computador com Linux

    steps:
      - name: 1. Puxar o código do repositório
        uses: actions/checkout@v3

      - name: 2. Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14.2'

      - name: 3. Instalar bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Criar credenciais do Google temporariamente
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: 5. Executar o script ETL
        run: python scripts/etl_atualizacao.py # Ajuste para o nome exato do seu script